spring:
  application:
    name: input

  datasource:
    url: jdbc:postgresql://${DATABASE_URL}/oci?reWriteBatchedInserts=true
    username: ${SUN_DATABASE_USERNAME}
    password: ${SUN_DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true