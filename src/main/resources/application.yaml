spring:
  application:
    name: input

  datasource:
    url: jdbc:postgresql://${DATABASE_URL}/oci
    username: ${SUN_DATABASE_USERNAME}
    password: ${SUN_DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true